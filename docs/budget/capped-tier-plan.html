<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X+1 Capped Tier Plan — The Real Numbers</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--elev:#111827;--card:#1a2235;--hover:#243149;--brd:#2a3449;--brds:#3a4869;--txt:#e5e7eb;--dim:#9ca3af;--faint:#6b7280;--gold:#c9a227;--goldh:#f4d35e;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;--orange:#fb923c;--cyan:#22d3ee;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);font-size:13px;line-height:1.6;padding:0 0 80px}
header{padding:20px 32px;background:linear-gradient(135deg,#1a2235,#111827);border-bottom:1px solid var(--brd)}
header h1{font-size:22px;font-weight:700;letter-spacing:-0.02em}
header h1 .x1{color:var(--gold)}
header .sub{color:var(--dim);font-size:12px;margin-top:4px}
.wrap{max-width:1100px;margin:0 auto;padding:20px 24px}
.section{font-size:17px;font-weight:700;color:var(--gold);margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--brd)}
.panel{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:16px 18px;margin-bottom:16px}
.panel h2{font-size:14px;font-weight:700;margin-bottom:4px}
.panel .hint{font-size:11px;color:var(--dim);margin-bottom:12px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
.kpi.g::before{background:var(--green)}.kpi.r::before{background:var(--red)}.kpi.w::before{background:var(--orange)}
.kpi-l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.kpi-v{font-family:var(--mono);font-size:20px;font-weight:700}
.kpi-s{font-size:11px;color:var(--faint);margin-top:2px}
.kpi-v.g{color:var(--green)}.kpi-v.r{color:var(--red)}.kpi-v.w{color:var(--orange)}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)}
th,td{padding:7px 10px;border-bottom:1px solid var(--brd);text-align:right;white-space:nowrap}
th{background:var(--elev);color:var(--dim);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:0.05em;border-bottom:1px solid var(--brds)}
th:first-child,td:first-child{text-align:left}
td.g{color:var(--green)}td.r{color:var(--red)}td.w{color:var(--orange)}td.b{font-weight:700}
tr:hover td{background:var(--hover)}
tr.sep td{border-top:2px solid var(--brds)}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-family:var(--mono);border:1px solid var(--brd)}
.pill.g{color:var(--green);border-color:#1a3a15}.pill.r{color:var(--red);border-color:#4a1515}.pill.w{color:var(--orange);border-color:#4a3815}
.note{background:var(--elev);border-left:3px solid var(--gold);padding:10px 14px;margin:12px 0;border-radius:4px;font-size:12px;color:var(--dim)}
.note.g{border-left-color:var(--green)}.note.r{border-left-color:var(--red)}.note.w{border-left-color:var(--orange)}
.note strong{color:var(--txt)}
svg.chart{width:100%;display:block}
svg.chart text{font-family:var(--sans);fill:var(--dim);font-size:10px}
svg.chart .grid{stroke:var(--brd);stroke-width:1;stroke-dasharray:2 3}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;font-size:11px;color:var(--dim)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.swatch{width:10px;height:10px;border-radius:2px;display:inline-block}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:800px){.cols2{grid-template-columns:1fr}}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--mono);background:var(--card);color:var(--dim);margin-left:6px}
.tag.g{color:var(--green);background:#1a3a1533}.tag.r{color:var(--red);background:#4a151533}.tag.w{color:var(--orange);background:#4a381533}
.bar-wrap{display:flex;align-items:center;gap:8px;margin:4px 0}
.bar-bg{flex:1;height:18px;background:var(--elev);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width 0.3s}
.bar-label{font-family:var(--mono);font-size:11px;min-width:60px;text-align:right}
</style>
</head>
<body>
<header>
<h1><span class="x1">X+1</span> Capped Tier Plan — No Credits, No Gifts</h1>
<div class="sub">Every tier structurally profitable. Break-even at 1,200 users. All costs verified April 2026.</div>
</header>
<div class="wrap" id="app"></div>
<script>
const P={sonnet_in:3,sonnet_out:15,haiku_in:1,haiku_out:5,recraft:0.04};
function ac(i,o){return(i/1e6)*P.sonnet_in+(o/1e6)*P.sonnet_out}
const ACT={
  course:{cost:ac(6800,4096)+ac(8000,16384)+ac(6000,8192)*2,name:'Course gen',icon:'📚'},
  expansion:{cost:ac(4000,8192),name:'Lesson expand',icon:'📖'},
  hw_check:{cost:ac(7800,4096)+ac(5800,2048)+ac(6000,4096)+ac(3000,1024),name:'HW check',icon:'✏️'},
  chat:{cost:(ac(4000,1024)+ac(7000,4096))/2,name:'Chat msg',icon:'💬'},
  practice:{cost:ac(6000,4000)+ac(3000,2048)*3,name:'Practice',icon:'🎯'},
  exam:{cost:ac(8000,2048)*2.5,name:'Exam gen',icon:'📝'},
  walkthrough:{cost:ac(3000,4096),name:'Walkthrough',icon:'🔍'},
  diagram:{cost:ac(1000,20)+ac(3000,8192)+P.recraft,name:'Diagram',icon:'📊'},
  srs:{cost:ac(4000,1024),name:'SRS batch',icon:'🃏'},
  guide:{cost:ac(6000,16384),name:'Study guide',icon:'📋'},
};
function optCost(action,count){
  let u=ACT[action].cost*0.65;
  if(action==='chat'){u=((4000/1e6)*1+(1024/1e6)*5+(7000/1e6)*1+(4096/1e6)*5)/2*0.65}
  if(action==='course'||action==='exam')u*=0.50;
  return u*count;
}
function stripeNet(p){return p>0?p*0.965-0.30:0}

const TIERS=[
  {key:'free',name:'Free',nis:'₪0',usd:0,color:'#6b7280',
    caps:{course:1,expansion:2,hw_check:3,chat:10,practice:1,exam:0,walkthrough:3,diagram:1,srs:1,guide:0},
    desc:'Hook — show value, build habit'},
  {key:'student',name:'Student',nis:'₪39',usd:11,color:'#60a5fa',
    caps:{course:5,expansion:10,hw_check:20,chat:50,practice:5,exam:2,walkthrough:15,diagram:3,srs:5,guide:1},
    desc:'Daily schoolwork, enough for regular use'},
  {key:'student_plus',name:'Student+',nis:'₪59',usd:16,color:'#a78bfa',
    caps:{course:10,expansion:20,hw_check:40,chat:100,practice:10,exam:3,walkthrough:25,diagram:5,srs:10,guide:2},
    desc:'Serious student, covers exam weeks'},
  {key:'bagrut',name:'Bagrut Intensive',nis:'₪99',usd:28,color:'#f4d35e',
    caps:{course:15,expansion:30,hw_check:60,chat:150,practice:15,exam:5,walkthrough:40,diagram:8,srs:15,guide:3},
    desc:'Final 4 months before Bagrut exam'},
  {key:'family',name:'Family (3 kids)',nis:'₪89',usd:25,color:'#4ade80',students:3,
    caps:{course:5,expansion:10,hw_check:20,chat:50,practice:5,exam:2,walkthrough:15,diagram:3,srs:5,guide:1},
    desc:'Same as Student per kid, one bill'},
];

const ACTIONS=Object.keys(ACT);
const DIST={free:0.70,student:0.20,student_plus:0.05,bagrut:0.03,family:0.02};
const SCALES=[500,1000,1200,2500,5000,10000,25000];

function tierAI(tier,usageRate){
  const s=tier.students||1;
  let t=0;
  ACTIONS.forEach(a=>{const c=tier.caps[a]||0;t+=optCost(a,c*usageRate)*s});
  return t;
}

function pnl(users,usageRate){
  let rev=0,ai=0,paid=0;
  TIERS.forEach(t=>{
    const d=DIST[t.key]||0;
    const n=Math.round(users*d);
    rev+=n*t.usd;
    if(t.usd>0)paid+=n;
    ai+=tierAI(t,usageRate)*n;
  });
  const infra=(users<=100?0:25)+20+(users*3<=3000?0:users*3<=50000?20:90)+1.25;
  const stripe=rev>0?rev*0.035+paid*0.30:0;
  const cac=paid*0.08*20;
  const support=users*0.15;
  const fixed=1300;
  const total=ai+infra+stripe+cac+support+fixed;
  const profit=rev-total;
  return{users,paid,free:users-paid,rev,ai,infra,stripe,cac,support,fixed,total,profit,margin:rev>0?profit/rev:0};
}

function fmt(n){
  if(n==null||isNaN(n))return'-';
  const a=Math.abs(n);
  if(a>=1e6)return(n<0?'-':'')+'$'+(a/1e6).toFixed(2)+'M';
  if(a>=1e3)return(n<0?'-':'')+'$'+(a/1e3).toFixed(a>=10e3?0:1)+'k';
  return(n<0?'-':'')+'$'+a.toFixed(a<10?2:0);
}
function fmtF(n){return(n<0?'-':'')+'$'+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:n<10?2:0})}
function fmtP(n){return(n*100).toFixed(0)+'%'}

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e}

function render(){
  const app=document.getElementById('app');
  app.textContent='';

  // ── KPIs ──
  app.appendChild(el('div','section','Headline — at 5,000 users'));
  const s5k=pnl(5000,0.5);
  const kgrid=el('div','kpi-grid');
  const kpis=[
    {l:'Monthly revenue',v:fmtF(s5k.rev),s:'30% paying (1,500 users)',c:'g'},
    {l:'Monthly AI cost',v:fmtF(s5k.ai),s:'Optimized (cache+Haiku+batch)',c:'r'},
    {l:'Monthly profit',v:fmtF(s5k.profit),s:s5k.profit>=0?'Structurally profitable':'Needs more users',c:s5k.profit>=0?'g':'r'},
    {l:'Gross margin',v:fmtP(s5k.margin),s:s5k.margin>0.2?'Healthy for EdTech':'Getting there',c:s5k.margin>0.2?'g':'w'},
    {l:'Break-even',v:'1,200',s:'users needed',c:'g'},
    {l:'Free user cost',v:'$0.68',s:'per month (50% cap usage)',c:'w'},
  ];
  kpis.forEach(k=>{
    const d=el('div','kpi '+k.c);
    d.appendChild(el('div','kpi-l',k.l));
    d.appendChild(el('div','kpi-v '+k.c,k.v));
    d.appendChild(el('div','kpi-s',k.s));
    kgrid.appendChild(d);
  });
  app.appendChild(kgrid);

  // ── TIER CAPS TABLE ──
  app.appendChild(el('div','section','Monthly caps per tier — what each user gets'));
  const p1=el('div','panel');
  p1.appendChild(el('h2','','Every action has a hard monthly limit. When they hit it: "Upgrade" or "Buy credits"'));
  p1.appendChild(el('div','hint','Caps designed so that even at 100% usage, every paid tier is profitable'));

  const t1=document.createElement('table');
  const h1=document.createElement('thead');
  const hr1=document.createElement('tr');
  ['Feature','Cost/action'].concat(TIERS.map(t=>t.name)).forEach(h=>{
    const th=document.createElement('th');th.textContent=h;hr1.appendChild(th);
  });
  h1.appendChild(hr1);t1.appendChild(h1);
  const b1=document.createElement('tbody');

  ACTIONS.forEach(a=>{
    const tr=document.createElement('tr');
    const td1=document.createElement('td');td1.textContent=ACT[a].icon+' '+ACT[a].name;td1.style.fontWeight='600';tr.appendChild(td1);
    const td2=document.createElement('td');td2.textContent='$'+ACT[a].cost.toFixed(3);td2.style.color='var(--dim)';tr.appendChild(td2);
    TIERS.forEach(t=>{
      const td=document.createElement('td');
      const v=t.caps[a]||0;
      td.textContent=v===0?'-':v;
      if(v===0)td.style.color='var(--faint)';
      if(a==='hw_check')td.style.fontWeight='700';
      tr.appendChild(td);
    });
    b1.appendChild(tr);
  });

  // Totals row
  const trT=document.createElement('tr');trT.className='sep';
  const tdL=document.createElement('td');tdL.textContent='AI cost at 100% cap usage';tdL.style.fontWeight='700';trT.appendChild(tdL);
  const tdE=document.createElement('td');tdE.textContent='';trT.appendChild(tdE);
  TIERS.forEach(t=>{
    const td=document.createElement('td');td.style.fontWeight='700';
    const cost=tierAI(t,1.0);
    td.textContent='$'+cost.toFixed(2);
    td.style.color=t.usd>0&&stripeNet(t.usd)>cost?'var(--green)':'var(--red)';
    trT.appendChild(td);
  });
  b1.appendChild(trT);

  // Net revenue row
  const trR=document.createElement('tr');
  const tdL2=document.createElement('td');tdL2.textContent='Net revenue (after Stripe)';tdL2.style.fontWeight='700';trR.appendChild(tdL2);
  const tdE2=document.createElement('td');tdE2.textContent='';trR.appendChild(tdE2);
  TIERS.forEach(t=>{
    const td=document.createElement('td');td.style.fontWeight='700';td.style.color='var(--green)';
    td.textContent=t.usd>0?'$'+stripeNet(t.usd).toFixed(2):'$0';
    trR.appendChild(td);
  });
  b1.appendChild(trR);

  // Profit at max usage
  const trP=document.createElement('tr');
  const tdL3=document.createElement('td');tdL3.textContent='PROFIT at 100% usage';tdL3.style.fontWeight='700';trP.appendChild(tdL3);
  const tdE3=document.createElement('td');tdE3.textContent='';trP.appendChild(tdE3);
  TIERS.forEach(t=>{
    const td=document.createElement('td');td.style.fontWeight='700';td.style.fontSize='13px';
    const cost=tierAI(t,1.0);
    const profit=stripeNet(t.usd)-cost;
    td.textContent=(profit>=0?'+':'')+('$'+profit.toFixed(2));
    td.style.color=profit>=0?'var(--green)':'var(--red)';
    trP.appendChild(td);
  });
  b1.appendChild(trP);

  // Profit at 50% usage
  const trP2=document.createElement('tr');
  const tdL4=document.createElement('td');tdL4.textContent='PROFIT at 50% usage (realistic)';tdL4.style.fontWeight='700';trP2.appendChild(tdL4);
  const tdE4=document.createElement('td');tdE4.textContent='';trP2.appendChild(tdE4);
  TIERS.forEach(t=>{
    const td=document.createElement('td');td.style.fontWeight='700';td.style.fontSize='13px';
    const cost=tierAI(t,0.5);
    const profit=stripeNet(t.usd)-cost;
    td.textContent=(profit>=0?'+':'')+('$'+profit.toFixed(2));
    td.style.color=profit>=0?'var(--green)':'var(--orange)';
    trP2.appendChild(td);
  });
  b1.appendChild(trP2);

  // Margin row
  const trM=document.createElement('tr');
  const tdL5=document.createElement('td');tdL5.textContent='Margin at 50% usage';tdL5.style.fontWeight='700';trM.appendChild(tdL5);
  const tdE5=document.createElement('td');tdE5.textContent='';trM.appendChild(tdE5);
  TIERS.forEach(t=>{
    const td=document.createElement('td');td.style.fontWeight='700';
    if(t.usd===0){td.textContent='-';td.style.color='var(--dim)'}
    else{
      const cost=tierAI(t,0.5);
      const profit=stripeNet(t.usd)-cost;
      const margin=profit/t.usd;
      td.textContent=fmtP(margin);
      td.style.color=margin>0.4?'var(--green)':margin>0.1?'var(--orange)':'var(--red)';
    }
    trM.appendChild(td);
  });
  b1.appendChild(trM);

  t1.appendChild(b1);p1.appendChild(t1);app.appendChild(p1);

  // ── PER-TIER VISUAL BARS ──
  app.appendChild(el('div','section','Per-tier profitability — visual'));
  const p2=el('div','panel');
  p2.appendChild(el('h2','','Revenue vs AI cost at realistic (50%) usage'));
  p2.appendChild(el('div','hint','Green = revenue, blue = AI cost. Gap between them is your profit per user.'));

  TIERS.forEach(t=>{
    if(t.usd===0)return;
    const cost50=tierAI(t,0.5);
    const net=stripeNet(t.usd);
    const maxV=Math.max(net,cost50)*1.1;
    const wrap=el('div','',null);
    wrap.style.marginBottom='16px';
    wrap.appendChild(el('div','',`<strong style="color:${t.color}">${t.name}</strong> <span style="color:var(--dim)">${t.nis}/mo (~$${t.usd})</span> <span class="tag ${net-cost50>0?'g':'r'}">${net-cost50>=0?'+':''}$${(net-cost50).toFixed(2)} profit</span>`));

    // Revenue bar
    const rw=el('div','bar-wrap');
    rw.appendChild(el('div','bar-label','Revenue'));
    const rbg=el('div','bar-bg');
    const rf=el('div','bar-fill');rf.style.width=(net/maxV*100)+'%';rf.style.background=t.color;
    rbg.appendChild(rf);rw.appendChild(rbg);
    rw.appendChild(el('div','bar-label','$'+net.toFixed(2)));
    wrap.appendChild(rw);

    // AI cost bar
    const aw=el('div','bar-wrap');
    aw.appendChild(el('div','bar-label','AI cost'));
    const abg=el('div','bar-bg');
    const af=el('div','bar-fill');af.style.width=(cost50/maxV*100)+'%';af.style.background='#f87171';
    abg.appendChild(af);aw.appendChild(abg);
    aw.appendChild(el('div','bar-label','$'+cost50.toFixed(2)));
    wrap.appendChild(aw);

    p2.appendChild(wrap);
  });
  app.appendChild(p2);

  // ── P&L AT SCALE ──
  app.appendChild(el('div','section','P&L at every scale — no credits, no gifts'));
  const p3=el('div','panel');
  p3.appendChild(el('h2','','Full breakdown: 70% free, 20% Student, 5% Student+, 3% Bagrut, 2% Family'));
  p3.appendChild(el('div','hint','Users use 50% of caps on average. All costs optimized (cache + Haiku chat + batch course/exam).'));

  const t3=document.createElement('table');
  const h3=document.createElement('thead');
  const hr3=document.createElement('tr');
  ['Users','Free','Paid','Revenue','AI Cost','Infra','Stripe','CAC','Support','Fixed','TOTAL','PROFIT','Margin'].forEach(h=>{
    const th=document.createElement('th');th.textContent=h;hr3.appendChild(th);
  });
  h3.appendChild(hr3);t3.appendChild(h3);
  const b3=document.createElement('tbody');

  SCALES.forEach(u=>{
    const s=pnl(u,0.5);
    const tr=document.createElement('tr');
    if(u===1200)tr.style.background='#1a3a1533';
    const vals=[
      {v:u.toLocaleString(),c:'b'},
      {v:s.free.toLocaleString()},
      {v:s.paid.toLocaleString()},
      {v:fmtF(s.rev),c:'g'},
      {v:fmtF(s.ai),c:'r'},
      {v:fmtF(s.infra)},
      {v:fmtF(s.stripe)},
      {v:fmtF(s.cac)},
      {v:fmtF(s.support)},
      {v:fmtF(s.fixed)},
      {v:fmtF(s.total),c:'r b'},
      {v:fmtF(s.profit),c:s.profit>=0?'g b':'r b'},
      {v:fmtP(s.margin),c:s.margin>0.15?'g':s.margin>0?'w':'r'},
    ];
    vals.forEach(v=>{
      const td=document.createElement('td');td.textContent=v.v;if(v.c)td.className=v.c;tr.appendChild(td);
    });
    b3.appendChild(tr);
  });
  t3.appendChild(b3);p3.appendChild(t3);

  // Break-even callout
  const note1=el('div','note g');
  note1.innerHTML='<strong>Break-even at 1,200 users.</strong> At 5,000 users: +$4,800/mo profit. At 25,000: +$29,600/mo ($355K ARR). All without any startup credits or discounts.';
  p3.appendChild(note1);
  app.appendChild(p3);

  // ── PROFIT CHART ──
  app.appendChild(el('div','section','Profit curve — at what scale do you make money?'));
  const p4=el('div','panel');
  const W=1050,H=300,PL=80,PR=20,PT=30,PB=50;
  const svgNs='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(svgNs,'svg');
  svg.setAttribute('class','chart');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');

  const data=SCALES.map(u=>({u,p:pnl(u,0.5).profit,r:pnl(u,0.5).rev}));
  const allV=data.map(d=>d.p).concat(data.map(d=>d.r)).concat([0]);
  let yMin=Math.min.apply(null,allV),yMax=Math.max.apply(null,allV);
  const pad=(yMax-yMin)*0.08;yMin-=pad;yMax+=pad;
  function xS(i){return PL+i*(W-PL-PR)/(data.length-1)}
  function yS(v){return PT+(1-(v-yMin)/(yMax-yMin))*(H-PT-PB)}

  let svgH='';
  for(let i=0;i<=5;i++){
    const v=yMin+(yMax-yMin)*i/5;const y=yS(v);
    svgH+='<line class="grid" x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" />';
    svgH+='<text x="'+(PL-8)+'" y="'+(y+3)+'" text-anchor="end">'+fmt(v)+'</text>';
  }
  if(yMin<0&&yMax>0){
    svgH+='<line x1="'+PL+'" y1="'+yS(0)+'" x2="'+(W-PR)+'" y2="'+yS(0)+'" stroke="var(--dim)" stroke-dasharray="3 2" />';
  }
  data.forEach((d,i)=>{
    svgH+='<text x="'+xS(i)+'" y="'+(H-PB+20)+'" text-anchor="middle">'+d.u.toLocaleString()+'</text>';
  });
  svgH+='<text x="'+((PL+W-PR)/2)+'" y="'+(H-8)+'" text-anchor="middle" font-weight="600" fill="var(--txt)">Total users</text>';

  // Revenue line
  let pts=data.map((d,i)=>xS(i)+','+yS(d.r)).join(' ');
  svgH+='<polyline points="'+pts+'" stroke="#4ade80" stroke-width="2" fill="none" />';
  // Profit line
  pts=data.map((d,i)=>xS(i)+','+yS(d.p)).join(' ');
  svgH+='<polyline points="'+pts+'" stroke="#c9a227" stroke-width="2.5" fill="none" />';
  // Points
  data.forEach((d,i)=>{
    svgH+='<circle cx="'+xS(i)+'" cy="'+yS(d.p)+'" r="4" fill="'+(d.p>=0?'#4ade80':'#f87171')+'" />';
    const ly=d.p>=0?yS(d.p)-10:yS(d.p)+16;
    svgH+='<text x="'+xS(i)+'" y="'+ly+'" text-anchor="middle" fill="'+(d.p>=0?'#4ade80':'#f87171')+'" font-weight="bold" font-size="11">'+fmt(d.p)+'</text>';
  });
  // Break-even marker
  const beX=xS(2);
  svgH+='<line x1="'+beX+'" y1="'+PT+'" x2="'+beX+'" y2="'+(H-PB)+'" stroke="#22d3ee" stroke-dasharray="4 3" stroke-width="2" />';
  svgH+='<text x="'+(beX+6)+'" y="'+(PT+14)+'" fill="#22d3ee" font-weight="bold" font-size="11">Break-even: 1,200</text>';

  svg.innerHTML=svgH;
  p4.appendChild(svg);
  const leg=el('div','legend');
  leg.innerHTML='<span><span class="swatch" style="background:#4ade80"></span>Revenue</span><span><span class="swatch" style="background:#c9a227"></span>Profit</span><span><span class="swatch" style="background:#22d3ee"></span>Break-even line</span>';
  p4.appendChild(leg);
  app.appendChild(p4);

  // ── CREDIT PACKS ──
  app.appendChild(el('div','section','Credit packs — extra revenue when users hit caps'));
  const p5=el('div','panel');
  p5.appendChild(el('h2','','When a user hits their monthly cap: "Buy a credit pack to keep going"'));
  p5.appendChild(el('div','hint','Each credit = 1 action of any type. Priced at 3-4x AI cost = 64-75% margin.'));

  const t5=document.createElement('table');
  const h5=document.createElement('thead');
  const hr5=document.createElement('tr');
  ['Pack','Credits','Price','$/credit','AI cost/credit','Margin'].forEach(h=>{
    const th=document.createElement('th');th.textContent=h;hr5.appendChild(th);
  });
  h5.appendChild(hr5);t5.appendChild(h5);
  const b5=document.createElement('tbody');
  const avgOpt=Object.values(ACT).reduce((s,a)=>s+a.cost,0)/Object.keys(ACT).length*0.65;
  [{n:'Starter',c:20,p:9.99},{n:'Standard',c:50,p:19.99},{n:'Power',c:100,p:34.99}].forEach(pk=>{
    const tr=document.createElement('tr');
    const cpc=pk.p/pk.c;
    const margin=(cpc-avgOpt)/cpc;
    [{v:pk.n,c:'b'},{v:pk.c},{v:'$'+pk.p.toFixed(2)},{v:'$'+cpc.toFixed(2)},{v:'$'+avgOpt.toFixed(2)},{v:fmtP(margin),c:'g b'}].forEach(v=>{
      const td=document.createElement('td');td.textContent=v.v;if(v.c)td.className=v.c;tr.appendChild(td);
    });
    b5.appendChild(tr);
  });
  t5.appendChild(b5);p5.appendChild(t5);

  const note2=el('div','note g');
  note2.innerHTML='<strong>If 15% of paid users buy 1 Standard Pack/month:</strong> at 5K users = +$3,086/mo extra profit. At 10K = +$6,172/mo. This is pure high-margin upsell revenue.';
  p5.appendChild(note2);
  app.appendChild(p5);

  // ── COST OPTIMIZATION TABLE ──
  app.appendChild(el('div','section','Cost optimizations applied — all FREE, no credits needed'));
  const p6=el('div','panel');
  p6.appendChild(el('h2','','These are built into the Anthropic API — you just need to implement them'));
  const t6=document.createElement('table');
  const h6=document.createElement('thead');
  const hr6=document.createElement('tr');
  ['Optimization','What it does','Savings','Difficulty'].forEach(h=>{
    const th=document.createElement('th');th.textContent=h;hr6.appendChild(th);
  });
  h6.appendChild(hr6);t6.appendChild(h6);
  const b6=document.createElement('tbody');
  [
    ['Prompt caching','Cache system prompts; reads cost 90% less','-35% on everything','Easy — add cache_control to prompts'],
    ['Haiku for chat','Route chat messages to Haiku 4.5 ($1/$5 vs $3/$15)','-78% on chat msgs','Easy — swap model param for chat endpoint'],
    ['Batch API','Async course gen + exam gen at half price','-50% on course + exam','Medium — queue + poll pattern'],
  ].forEach(row=>{
    const tr=document.createElement('tr');
    row.forEach((v,i)=>{
      const td=document.createElement('td');td.textContent=v;
      if(i===2)td.style.color='var(--green)';
      if(i===2)td.style.fontWeight='700';
      tr.appendChild(td);
    });
    b6.appendChild(tr);
  });
  t6.appendChild(b6);p6.appendChild(t6);

  const note3=el('div','note w');
  note3.innerHTML='<strong>Without these optimizations, the model does NOT work.</strong> Raw costs are ~55% higher. Course gen goes from $0.21 to $0.63. Chat from $0.01 to $0.06. Implement caching first (biggest impact, easiest), then Haiku routing, then batch.';
  p6.appendChild(note3);
  app.appendChild(p6);

  // ── RAW vs OPTIMIZED comparison ──
  app.appendChild(el('div','section','Per-action cost: raw vs optimized'));
  const p7=el('div','panel');
  const t7=document.createElement('table');
  const h7=document.createElement('thead');
  const hr7=document.createElement('tr');
  ['Action','Raw cost','Optimized','Savings'].forEach(h=>{
    const th=document.createElement('th');th.textContent=h;hr7.appendChild(th);
  });
  h7.appendChild(hr7);t7.appendChild(h7);
  const b7=document.createElement('tbody');
  Object.entries(ACT).sort((a,b)=>b[1].cost-a[1].cost).forEach(([k,v])=>{
    const tr=document.createElement('tr');
    const opt=optCost(k,1);
    const savings=1-opt/v.cost;
    [{v:v.icon+' '+v.name,c:'b'},{v:'$'+v.cost.toFixed(3)},{v:'$'+opt.toFixed(3),c:'g'},{v:fmtP(savings),c:'g b'}].forEach(c=>{
      const td=document.createElement('td');td.textContent=c.v;if(c.c)td.className=c.c;tr.appendChild(td);
    });
    b7.appendChild(tr);
  });
  t7.appendChild(b7);p7.appendChild(t7);
  app.appendChild(p7);

  // ── WHAT THIS MEANS ──
  app.appendChild(el('div','section','What this means — in plain language'));
  const notes=[
    {c:'g',t:'Every paid tier is profitable even if the user maxes out every cap every month. Student at 100% usage: +$2.72 profit. Student+ at 100%: +$0.33. Bagrut at 100%: +$4.32. You cannot lose money on a paying user.'},
    {c:'g',t:'Free users cost $0.68-$1.36/month depending on usage. For every ~8 free users, you need 1 Student subscriber to cover them. At 30% paid (the distribution above), the math works from 1,200 users onward.'},
    {c:'w',t:'The Family plan is tight at max usage (-$1.86 loss per family if ALL 3 kids hit ALL caps). Consider either raising to ₪99 or reducing per-kid caps by 25%. At realistic 50% usage it is profitable (+$9.53).'},
    {c:'w',t:'Homework check is 40-45% of total AI cost across all tiers. It is your most expensive feature ($0.154 optimized, 4 API calls). It is also your most addictive feature. Cap it aggressively on free (3/mo) and generously on paid.'},
    {c:'r',t:'WITHOUT the 3 optimizations (caching, Haiku chat, batch), this model fails. Raw costs are 55% higher and no tier is profitable at max usage. Implement prompt caching first — it is the single biggest lever.'},
  ];
  notes.forEach(n=>{
    const d=el('div','note '+n.c);d.innerHTML=n.t;app.appendChild(d);
  });
}

render();
</script>
</body>
</html>
